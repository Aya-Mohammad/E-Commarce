# E-commerce Application Nginx Configuration for Load Testing
# Load balancer listening on 8085 with two upstream Laravel app servers

upstream ecommerce_backend {
    least_conn;
    server 127.0.0.1:9001 max_fails=3 fail_timeout=5s;
    server 127.0.0.1:9002 max_fails=3 fail_timeout=5s;
}

server {
    listen 8085;
    server_name localhost ecommerce.test;

    # Logs for debugging
    access_log /tmp/ecommerce-nginx-access.log;
    error_log /tmp/ecommerce-nginx-error.log;

    location / {
        proxy_pass http://ecommerce_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }
}
